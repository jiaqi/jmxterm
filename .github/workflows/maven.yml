name: maven

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build_and_verify:
    uses: ./.github/workflows/maven_build_verify_job.yml
  publish:
    needs: build_and_verify
    if: contains(fromJSON('["main", "seattle"]'), github.ref_name)
    uses: ./.github/workflows/maven_publish_job.yml
