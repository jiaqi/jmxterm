name: maven_publish

on:
  workflow_run:
    workflows: [ "maven_verify" ]
    types:
      - completed
    branches:
      - main
      - seattle

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/maven_publish_job.yml
